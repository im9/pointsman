name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  m4l:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: m4l
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: m4l/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: m4l/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r build
      - run: pnpm bundle:host
      - run: pnpm -r test
